<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kesari CRM • Enquiries</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../shared/shared.css">
<link rel="stylesheet" href="enquiries.css">

</head>

<body>

<!-- Toast -->
<div id="toast-wrap"></div>

<!-- ==========================================================
APP
=========================================================== -->

<div class="app-shell">

    <!-- Navigation injected from shared.js -->
    <div id="navRoot"></div>

    <!-- Enquiries page -->
    <main
        class="page enquiries-page"
        id="pageRoot">

        <!-- Everything below is rendered from enquiries.js -->

    </main>

</div>

<!-- ==========================================================
NEW ENQUIRY POPUP
=========================================================== -->

<div
class="overlay-backdrop"
id="overlayBackdrop">

    <div
    class="overlay-panel"
    id="overlayPanel">

    </div>

</div>

<!-- ==========================================================
LOADING SCREEN
=========================================================== -->

<div
id="pageLoader"
class="page-loader hidden">

    <div class="loader-box">

        <div class="loader-spinner"></div>

        <div class="loader-text">

            Loading Enquiries...

        </div>

    </div>

</div>

<!-- ==========================================================
SCRIPTS
=========================================================== -->

<script src="../shared/data-api.js"></script>
<script src="../shared/shared.js"></script>
<script src="enquiries.js"></script>

</body>
</html>
